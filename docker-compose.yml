services:
  postgres:
    image: postgres:16-alpine
    container_name: room-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: room_platform
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: room-redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5

  migrate:
    build:
      context: .
      dockerfile: apps/api/Dockerfile
    command: pnpm --filter @repo/db exec prisma migrate deploy
    environment:
      DATABASE_URL: ${DATABASE_URL}
    depends_on:
      postgres:
        condition: service_healthy
    restart: on-failure

  api:
    build:
      context: .
      dockerfile: apps/api/Dockerfile
    container_name: room-api
    restart: unless-stopped
    ports:
      - "4000:4000"
    environment:
      DATABASE_URL: ${DATABASE_URL}
      REDIS_URL: ${REDIS_URL}
      NODE_ENV: development
      OUTPUT_DIR: /app/services/renderer/output
      MODELS_DIR: /app/models
      CHAIR_BLEND_SRC: /app/services/renderer/chair.blend
      CHAIR_THUMB_SRC: /app/services/renderer/chair-thumb.png
      RENDERER_URL: http://renderer:5000
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      migrate:
        condition: service_completed_successfully
    volumes:
      - render_output:/app/services/renderer/output
      - models_storage:/app/models
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:4000/health"]
      interval: 10s
      timeout: 5s
      start_period: 30s
      retries: 5

  renderer:
    build:
      context: .
      dockerfile: services/renderer/Dockerfile
    container_name: room-renderer
    restart: unless-stopped
    ports:
      - "5000:5000"
    environment:
      BLENDER_BIN: blender
      OUTPUT_DIR: /tmp/renderer_output
      OPENAI_API_KEY: ${OPENAI_API_KEY:-}
      OPENAI_IMAGE_MODEL: ${OPENAI_IMAGE_MODEL:-gpt-image-1}
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:5000/health"]
      interval: 15s
      timeout: 5s
      start_period: 120s
      retries: 5

  worker:
    build:
      context: .
      dockerfile: apps/worker/Dockerfile
    container_name: room-worker
    restart: unless-stopped
    environment:
      DATABASE_URL: ${DATABASE_URL}
      REDIS_URL: ${REDIS_URL}
      NODE_ENV: development
      OUTPUT_DIR: /app/services/renderer/output
      MODELS_DIR: /app/models
      RENDERER_URL: http://renderer:5000
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      migrate:
        condition: service_completed_successfully
      renderer:
        condition: service_healthy
    volumes:
      - render_output:/app/services/renderer/output
      - models_storage:/app/models

  web:
    build:
      context: .
      dockerfile: apps/web/Dockerfile
    container_name: room-web
    restart: unless-stopped
    ports:
      - "3000:3000"
    environment:
      NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL}
      NODE_ENV: development
    depends_on:
      api:
        condition: service_healthy

volumes:
  postgres_data:
  render_output:
  models_storage:
